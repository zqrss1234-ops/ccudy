name: Build abdulilah

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install ldid
      run: brew install ldid

    - name: Install Theos
      run: |
        git clone --recursive --depth 1 https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Build with Theos
      run: |
        export THEOS=$HOME/theos
        make clean
        make package FINALPACKAGE=1
        echo "=== DYLIB ==="
        find . -name "*.dylib" | head -5
        find . -name "*.deb" | head -5

    - name: Extract and sign
      run: |
        DYLIB="./.theos/obj/abdulilah.dylib"
        if [ ! -f "$DYLIB" ]; then
          echo "NO DYLIB FOUND"
          find . -type f -name "*.dylib" ! -path "*.dSYM*" | head -10
          exit 1
        fi
        echo "Found: $DYLIB"
        cp "$DYLIB" abdulilah.dylib
        file abdulilah.dylib
        ls -lh abdulilah.dylib

    - name: Upload dylib
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: abdulilah-dylib
        path: abdulilah.dylib
