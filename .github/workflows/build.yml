name: Build abdulilah

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install ldid
      run: brew install ldid

    - name: Syntax check (host compile)
      run: |
        set -e
        echo "=== Host compile Tweak.m ==="
        xcrun clang -x objective-c -c \
          -fobjc-arc \
          -ILibraries \
          -o /tmp/Tweak.o Tweak/Tweak.m 2>&1
        echo "=== Host compile Glitch.m ==="
        xcrun clang -x objective-c -c \
          -fobjc-arc \
          -ILibraries \
          -o /tmp/Glitch.o Tweak/Glitch.m 2>&1
        echo "=== Host compile Speed.m ==="
        xcrun clang -x objective-c -c \
          -fobjc-arc \
          -ILibraries \
          -o /tmp/Speed.o Tweak/Speed.m 2>&1
        echo "=== Host compile LicenseManager.m ==="
        xcrun clang -x objective-c -c \
          -fobjc-arc \
          -ILibraries \
          -o /tmp/LicenseManager.o Libraries/LicenseManager.m 2>&1
        echo "=== ALL HOST COMPILES OK ==="

    - name: SDK check
      run: |
        set -e
        echo "=== SDK path ==="
        xcrun --sdk iphoneos --show-sdk-path || echo "NO_SDK"
        echo "=== SDK list ==="
        xcrun --sdk iphoneos --show-sdk-version || echo "NO_VERSION"
        echo "=== All SDKs ==="
        xcodebuild -showsdks 2>&1 | head -20
        echo "=== Simulator SDK ==="
        xcrun --sdk iphonesimulator --show-sdk-path || echo "NO_SIM_SDK"

    - name: Cross-compile for iOS
      run: |
        set -e
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "SDK=$SDK"
        for f in Tweak/Tweak.m Tweak/Glitch.m Tweak/Speed.m Libraries/LicenseManager.m; do
          echo "=== iOS compile $f ==="
          xcrun clang -x objective-c -c \
            -arch arm64 \
            -isysroot "$SDK" \
            -fobjc-arc \
            -ILibraries \
            -o /tmp/$(basename $f .m)-ios.o \
            "$f"
        done
        echo "=== ALL iOS COMPILES OK ==="

    - name: Link
      run: |
        set -e
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        xcrun clang -dynamiclib \
          -arch arm64 \
          -isysroot "$SDK" \
          -fobjc-arc \
          -framework Foundation \
          -framework UIKit \
          -framework QuartzCore \
          -framework AudioToolbox \
          -framework AVFoundation \
          -o abdulilah.dylib \
          /tmp/Tweak-ios.o /tmp/Glitch-ios.o /tmp/Speed-ios.o /tmp/LicenseManager-ios.o \
          -install_name @rpath/abdulilah.dylib \
          -compatibility_version 1.0 \
          -current_version 1.0 \
          -undefined dynamic_lookup 2>&1
        echo "=== LINK OK ==="
        ls -lh abdulilah.dylib
        file abdulilah.dylib

    - name: Sign
      run: |
        ldid -S abdulilah.dylib
        echo "Signed"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: abdulilah-dylib
        path: abdulilah.dylib
