name: Build abdulilah

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install ldid
      run: brew install ldid

    - name: Setup Theos
      run: |
        export THEOS="$HOME/theos"
        echo "THEOS=$THEOS" >> $GITHUB_ENV
        git clone --recursive --depth 1 https://github.com/theos/theos.git "$THEOS" 2>&1 | tail -5
        mkdir -p "$THEOS/sdks"
        curl -L -o /tmp/sdk.tar.xz https://github.com/theos/sdks/releases/latest/download/iPhoneOS14.5.sdk.tar.xz
        tar -xf /tmp/sdk.tar.xz -C "$THEOS/sdks/"
        echo "THEOS=$THEOS"
        ls "$THEOS/sdks/" | head -5

    - name: Build with make
      run: |
        export THEOS="$HOME/theos"
        make 2>&1
        echo "=== Exit code: $? ==="

    - name: Find and sign .dylib
      run: |
        export THEOS="$HOME/theos"
        find .theos -name "*.dylib" 2>/dev/null || echo "No .dylib in .theos"
        find /tmp -name "*.dylib" 2>/dev/null || true
        # Try to find any .dylib output
        DYLIB=$(find . -name "*.dylib" -not -path "./.git/*" 2>/dev/null | head -1)
        if [ -n "$DYLIB" ]; then
          cp "$DYLIB" abdulilah.dylib
          ldid -S abdulilah.dylib
          echo "✅ Signed abdulilah.dylib"
          ls -lh abdulilah.dylib
        else
          echo "❌ No .dylib found"
          # List theos output
          find .theos -type f 2>/dev/null | head -20
        fi

    - name: Upload .dylib
      uses: actions/upload-artifact@v4
      with:
        name: abdulilah-dylib
        path: abdulilah.dylib
        if-no-files-found: warn
