name: Build dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build dylib (arm64)
      run: |
        set -e
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)

        clang -dynamiclib \
          -arch arm64 \
          -isysroot "$SDK" \
          -fobjc-arc \
          -framework Foundation \
          -framework UIKit \
          -o libLicenseManager.dylib \
          LicenseManager/LicenseManager.m \
          -install_name @rpath/libLicenseManager.dylib \
          -compatibility_version 1.0 \
          -current_version 1.0

        echo "✅ libLicenseManager.dylib built successfully"
        ls -lh libLicenseManager.dylib
        file libLicenseManager.dylib

    - name: Upload dylib artifact
      uses: actions/upload-artifact@v4
      with:
        name: libLicenseManager.dylib
        path: libLicenseManager.dylib
