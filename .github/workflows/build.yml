name: Build abdulilah

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install ldid
      run: brew install ldid

    - name: Check architectures
      run: |
        echo "=== SDK ==="
        xcrun --sdk iphoneos --show-sdk-path
        echo "=== Architectures ==="
        xcrun clang -arch arm64 -x c - -o /dev/null -c 2>&1 <<< "int x;" && echo "arm64: OK" || echo "arm64: FAIL"
        xcrun clang -arch arm64e -x c - -o /dev/null -c 2>&1 <<< "int x;" && echo "arm64e: OK" || echo "arm64e: FAIL"

    - name: iOS compile Tweak.m
      run: |
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        xcrun clang -x objective-c -c -arch arm64 -arch arm64e -isysroot "$SDK" \
          -fobjc-arc -mios-version-min=14.0 -ILibraries \
          -o /tmp/Tweak-ios.o Tweak/Tweak.m

    - name: iOS compile Glitch.m
      run: |
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        xcrun clang -x objective-c -c -arch arm64 -arch arm64e -isysroot "$SDK" \
          -fobjc-arc -mios-version-min=14.0 -ILibraries \
          -o /tmp/Glitch-ios.o Tweak/Glitch.m

    - name: iOS compile Speed.m
      run: |
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        xcrun clang -x objective-c -c -arch arm64 -arch arm64e -isysroot "$SDK" \
          -fobjc-arc -mios-version-min=14.0 -ILibraries \
          -o /tmp/Speed-ios.o Tweak/Speed.m

    - name: Link dylib
      run: |
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        xcrun clang -dynamiclib -arch arm64 -arch arm64e -isysroot "$SDK" \
          -fobjc-arc -mios-version-min=14.0 \
          -framework Foundation -framework UIKit -framework QuartzCore \
          -framework AudioToolbox -framework AVFoundation \
          -o abdulilah.dylib \
          /tmp/Tweak-ios.o /tmp/Glitch-ios.o /tmp/Speed-ios.o \
          -install_name @rpath/abdulilah.dylib \
          -compatibility_version 1.0 -current_version 1.0 -undefined dynamic_lookup
        echo "BUILD SUCCESS"
        ls -lh abdulilah.dylib
        file abdulilah.dylib

    - name: Sign
      if: success()
      run: |
        ldid -S abdulilah.dylib
        echo "Signed"

    - name: Upload dylib
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: abdulilah-dylib
        path: abdulilah.dylib
