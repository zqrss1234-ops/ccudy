name: Build dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install ldid
      run: brew install ldid

    - name: Build YLTool.dylib (arm64)
      run: |
        set -e
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)

        clang -dynamiclib \
          -arch arm64 \
          -isysroot "$SDK" \
          -fobjc-arc \
          -framework Foundation \
          -framework UIKit \
          -framework AVFoundation \
          -o YLTool.dylib \
          LicenseManager/LicenseManager.m \
          -install_name @rpath/YLTool.dylib \
          -compatibility_version 1.0 \
          -current_version 1.0 \
          -undefined dynamic_lookup

        echo "✅ YLTool.dylib built successfully"
        ls -lh YLTool.dylib
        file YLTool.dylib

    - name: Sign YLTool.dylib
      run: |
        ldid -S YLTool.dylib
        echo "✅ YLTool.dylib signed"
        codesign -dvvv YLTool.dylib 2>&1 || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: YLTool.dylib
        path: YLTool.dylib
