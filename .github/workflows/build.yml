name: Build abdulilah

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install ldid
      run: brew install ldid

    - name: Build abdulilah.dylib
      run: |
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "SDK: $SDK"

        clang -dynamiclib \
          -arch arm64 \
          -arch arm64e \
          -isysroot "$SDK" \
          -fobjc-arc \
          -ILibraries \
          -framework Foundation \
          -framework UIKit \
          -framework QuartzCore \
          -framework AudioToolbox \
          -framework AVFoundation \
          -o abdulilah.dylib \
          Tweak/Tweak.m Tweak/Glitch.m Tweak/Speed.m Libraries/LicenseManager.m \
          -install_name @rpath/abdulilah.dylib \
          -compatibility_version 1.0 \
          -current_version 1.0 \
          -undefined dynamic_lookup

        echo "Exit code: $?"
        ls -lh abdulilah.dylib
        file abdulilah.dylib

    - name: Sign with ldid
      run: |
        ldid -S abdulilah.dylib
        echo "✅ Signed"
        codesign -dvvv abdulilah.dylib 2>&1 | head -3 || true

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: abdulilah-dylib
        path: abdulilah.dylib
        if-no-files-found: error
