name: Build abdulilah

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install ldid
      run: brew install ldid

    - name: Check env
      run: |
        echo "=== xcrun clang version ==="
        xcrun clang --version
        echo "=== SDK search ==="
        xcrun --sdk iphoneos --show-sdk-path 2>&1 || echo "FAILED: no iphoneos SDK"
        ls /Applications/Xcode*.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/ 2>&1 || echo "No iPhoneOS SDKs found"
        echo "=== Xcode paths ==="
        xcode-select -p
        ls "$(xcode-select -p)/Platforms/iPhoneOS.platform/Developer/SDKs/" 2>&1 || echo "No SDKs in selected path"

    - name: Build
      run: |
        set -e
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "SDK=$SDK"

        OBJ=""
        for f in Tweak/Tweak.m Tweak/Glitch.m Tweak/Speed.m Libraries/LicenseManager.m; do
          echo "=== Compile $f ==="
          xcrun clang -x objective-c -c \
            -arch arm64 \
            -isysroot "$SDK" \
            -fobjc-arc \
            -ILibraries \
            -o /tmp/$(basename $f).o \
            "$f"
          OBJ="$OBJ /tmp/$(basename $f).o"
        done

        echo "=== Link ==="
        xcrun clang -dynamiclib \
          -arch arm64 \
          -isysroot "$SDK" \
          -fobjc-arc \
          -framework Foundation \
          -framework UIKit \
          -framework QuartzCore \
          -framework AudioToolbox \
          -framework AVFoundation \
          -o abdulilah.dylib \
          $OBJ \
          -install_name @rpath/abdulilah.dylib \
          -compatibility_version 1.0 \
          -current_version 1.0 \
          -undefined dynamic_lookup

        echo "=== Done ==="
        ls -lh abdulilah.dylib
        file abdulilah.dylib
      shell: bash

    - name: Sign
      run: |
        ldid -S abdulilah.dylib
        echo "Signed"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: abdulilah-dylib
        path: abdulilah.dylib
